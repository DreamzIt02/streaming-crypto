### The strategy
# - **Cargo version stays fixed** until we actually change `core-api` (or other Rust sources).
# - **GitHub tags carry extra suffixes** to distinguish retries for PyPI or crates.io, without altering Cargo.toml.
# - Each workflow trims the suffix to get the “real” Cargo version for validation, but uses the full tag for uniqueness in GitHub.

### Tag naming convention
# - Crates.io:  
#   - `v0.1.0-alpha.0-crates.0` → first attempt  
#   - `v0.1.0-alpha.0-crates.1` → retry (same Cargo version, different GitHub tag)
# - PyPI:  
#   - `v0.1.0-alpha.0-pypi.0` → first attempt  
#   - `v0.1.0-alpha.0-pypi.1` → retry

# Here:
# - `0.1.0-alpha.0` = Cargo version (matches Cargo.toml)  
# - `-crates` or `-pypi` = workflow selector  
# - `.N` = retry counter (any integer, ensures unique GitHub tag)

### Workflow changes
# Both workflows need to:
# 1. **Trim suffixes** (`-crates.N` or `-pypi.N`) to extract the Cargo version.
# 2. **Validate Cargo.toml version** against that trimmed version.
# 3. For PyPI, **verify crates.io has published that version** before proceeding.

# ✅ This way:
# - We can retry PyPI publishes as many times as needed (`-pypi.0`, `-pypi.1`, …) without touching Cargo.toml.
# - Crates.io publishes only when we actually bump the Cargo version.
# - Both workflows stay consistent with Cargo.toml, and GitHub tags remain unique.

name: Publish PyPI

on:
  push:
    tags:
      - 'v*-pypi.[0-9]'
      - 'v*-pypi.[0-9][0-9]'

jobs:
  detect-tag:
      name: Initialize Build (pyo3)
      uses: ./.github/workflows/init-publish.yml
      with:
        regex: 'v*-pypi.[0-9]'
        prefix: 'v'
        suffix: 'pypi'

  pre-os-check:
    runs-on: ubuntu-latest
    outputs:
      os-list: ${{ steps.set-os.outputs.os-list }}
    steps:
      - name: Select OS matrix according to env
        id: set-os
        shell: bash
        run: |
          if [ "${{ env.ACT }}" = "true" ]; then
            echo 'os-list=["ubuntu-latest"]' >> $GITHUB_OUTPUT
          else
            echo 'os-list=["ubuntu-latest","macos-latest","windows-latest"]' >> $GITHUB_OUTPUT
          fi

  # ✅ prepare-pypi
  prepare:
    if: ${{ needs.detect-tag.outputs.tag_is_matched == 'true' }}
    needs: [detect-tag]
    uses: ./.github/workflows/prepare-pypi.yml
    with:
      tag: ${{ needs.detect-tag.outputs.tag_version }}
      modules: |
        #[cfg(feature = \"core-api\")] pub mod core_api;
        #[cfg(feature = \"ffi-api\")]  pub mod ffi_api;
        #[cfg(feature = \"pyo3-api\")] pub mod pyo3_api;
      features: |
        default = [\"pyo3-api\"]
      dependencies: |
        core-api = { package=\"streaming-crypto\", version = \"${{ needs.detect-tag.outputs.tag_version }}\", features = [] }

  # ✅ build wheels for many OS
  build:
    if: ${{ needs.detect-tag.outputs.tag_is_matched == 'true' && needs.detect-tag.outputs.tag_is_published == 'true' }}
    needs: [detect-tag, pre-os-check, prepare]
    name: Build wheels + sdist
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: ${{ fromJson(needs.pre-os-check.outputs.os-list) }}

    steps:
      - name: Mark local run
        if: ${{ env.ACT == 'true' }}
        shell: bash
        run: echo "IS_LOCAL=true" >> $GITHUB_ENV

      # 1️⃣ Fresh checkout for changelog
      - name: Checkout repository (for git history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      # 2️⃣ Get prepared crate for publishing
      - name: Download prepared crate
        uses: actions/download-artifact@v4
        with:
          name: prepared-crate
          path: prepared-crate

      - name: Move prepared crate into repo
        shell: bash
        run: |
          rm -rf streaming-crypto
          mv prepared-crate streaming-crypto

      # 3️⃣ Install libraries
      - name: Install Rust
        if: ${{ env.IS_LOCAL != 'true' }}
        uses: dtolnay/rust-toolchain@stable

      - name: Ensure Rust targets
        if: ${{ env.IS_LOCAL != 'true' }}
        shell: bash
        run: |
          rustup target add x86_64-apple-darwin
        # rustup target add aarch64-apple-darwin, github.com has default to arm64 macos

      - name: Install Python
        if: ${{ env.IS_LOCAL != 'true' }}
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Export PYO3_PYTHON
        if: ${{ env.IS_LOCAL != 'true' }}
        shell: bash
        run: echo "PYO3_PYTHON=${{ steps.setup-python.outputs.python-path }}" >> $GITHUB_ENV

      - name: Install build tools
        if: ${{ env.IS_LOCAL != 'true' }}
        shell: bash
        run: pip install maturin cibuildwheel twine "packaging>=24.2"

      # 4️⃣ Cache
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          # This is fine, but if we ever add multiple workspaces/crates, we may want to scope the hash to each crate’s Cargo.lock. 
          # Otherwise, unrelated changes can invalidate the cache.
          key: ${{ runner.os }}-cargo-${{ hashFiles('streaming-crypto/Cargo.lock') }}

      # 5️⃣ Build wheels for each OS
      - name: Build wheels (local)
        if: ${{ env.IS_LOCAL == 'true' }}
        working-directory: streaming-crypto
        shell: bash
        run: |
          mkdir -p wheelhouse
          cibuildwheel --platform auto --output-dir wheelhouse
        env:
          CIBW_BUILD      : cp312-*                 # restrict to Python 3.12
          CIBW_SKIP       : "cp312-musllinux_x86_64 cp312-musllinux_aarch64 pp*" # skip musllinux and PyPy
          CIBW_ARCHS_LINUX: x86_64                  # skip aarch64
          CIBW_CONTAINER_ENGINE       : docker
          CIBW_MANYLINUX_X86_64_IMAGE : manylinux-custom-x86_64
          CIBW_MANYLINUX_AARCH64_IMAGE: manylinux-custom-aarch64
          CIBW_MUSLLINUX_X86_64_IMAGE : "" #musllinux-custom-x86_64
          CIBW_MUSLLINUX_AARCH64_IMAGE: "" #musllinux-custom-aarch64

      # 5️⃣ Build wheels for each OS (dummy)
      # - name: Build wheels (dummy)
      #   if: ${{ env.IS_LOCAL == 'true' }}
      #   working-directory: streaming-crypto
      #   shell: bash
      #   run: |
      #     mkdir -p wheelhouse
      #     echo "Dummy wheel for ${{ matrix.os }}" > wheelhouse/streaming_crypto-0.0.0-${{ matrix.os }}-py3-none-any.whl

      - name: Build wheels
        if: ${{ env.IS_LOCAL != 'true' }}
        working-directory: streaming-crypto
        shell: bash
        run: |
          mkdir -p wheelhouse
          cibuildwheel --platform auto --output-dir wheelhouse
        env:
          CIBW_BUILD: cp312-*                     # restrict to Python 3.12
          CIBW_SKIP : "pp*"                       # skip musllinux and PyPi: "cp312-musllinux* pp*""
          CIBW_ARCHS_LINUX      : x86_64          # build both Intel + ARM linux wheels (github.com, not supporter)
          CIBW_ARCHS_MACOS      : x86_64 arm64    # build both Intel + ARM macOS wheels
          CIBW_ARCHS_WINDOWS    : AMD64           # build both Intel + ARM winOS wheels (github.com, not supporter)
          
      # Build sdist once for any os (linux/windows/macos) (only on Linux to avoid duplication)
      - name: Build sdist
        if: matrix.os == 'ubuntu-latest'
        working-directory: streaming-crypto
        shell: bash
        run: maturin sdist --out wheelhouse

      # - name: Build wheels (dummy)
      #   if: matrix.os == 'ubuntu-latest'
      #   working-directory: streaming-crypto
      #   shell: bash
      #   run: |
      #     mkdir -p wheelhouse
      #     echo "Dummy sdist for ${{ matrix.os }}" > wheelhouse/streaming_crypto-0.1.0b6.tar.gz

      - name: Show wheelhouse
        working-directory: streaming-crypto
        shell: bash
        run: |
          echo "Listing wheelhouse"
          ls -R wheelhouse || true

      - name: Prepare artifacts for publishing
        shell: bash
        run: |
          mkdir -p prepared-artifacts
          cp -r streaming-crypto/wheelhouse/* prepared-artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: prepared-artifacts-${{ matrix.os }}
          path: prepared-artifacts

  # ✅ publish to pypi.org
  publish:
    if: ${{ needs.detect-tag.outputs.tag_is_matched == 'true' && needs.detect-tag.outputs.tag_is_published == 'true' }}
    name: Publish Python Wheel
    needs: [detect-tag, pre-os-check, build] # Require all
    strategy: 
      matrix: 
        os: [ubuntu-latest] 
        rust: [stable]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Mark local run
        if: ${{ env.ACT == 'true' }}
        shell: bash
        run: echo "IS_LOCAL=true" >> $GITHUB_ENV
      
      - name: Debug os-list
        shell: bash
        run: echo "${{ needs.pre-os-check.outputs.os-list }}"

      # 1️⃣ Fresh checkout for changelog
      - name: Checkout repository (for git history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      # 2️⃣ Download artifacts from upload step of build job (all os matrix)
      - name: Prepare crate for publishing
        working-directory: streaming-crypto
        shell: bash
        run: mkdir -p dist

      - name: Download artifacts (ubuntu-latest)
        if: ${{ contains(needs.pre-os-check.outputs.os-list, 'ubuntu-latest') }}
        uses: actions/download-artifact@v4
        with:
          name: prepared-artifacts-ubuntu-latest
          path: streaming-crypto/dist

      - name: Show dist files
        working-directory: streaming-crypto
        shell: bash
        run: ls -R dist

      - name: Download artifacts (macos-latest)
        if: ${{ contains(needs.pre-os-check.outputs.os-list, 'macos-latest') }}
        uses: actions/download-artifact@v4
        with:
          name: prepared-artifacts-macos-latest
          path: streaming-crypto/dist

      - name: Show dist files
        working-directory: streaming-crypto
        shell: bash
        run: ls -R dist

      - name: Download artifacts (windows-latest)
        if: ${{ contains(needs.pre-os-check.outputs.os-list, 'windows-latest') }}
        uses: actions/download-artifact@v4
        with:
          name: prepared-artifacts-windows-latest
          path: streaming-crypto/dist

      - name: Show dist files
        working-directory: streaming-crypto
        shell: bash
        run: ls -R dist

      - name: Install twine
        shell: bash
        run: pip install "twine>=6.2.0" "packaging>=24.2"

      - name: Check artifacts
        working-directory: streaming-crypto
        shell: bash
        run: twine check dist/*

      # 6️⃣ Publish to pypi.org
      - name: Publish to PyPI
        if: ${{ env.IS_LOCAL != 'true' }}
        working-directory: streaming-crypto
        shell: bash
        run: twine upload --skip-existing dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
