name: CI (core-api)

on:
  push:
    tags:
      - 'b*-core.[0-9]'

jobs:
  detect-tag:
    name: Initialize Build (core)
    uses: ./.github/workflows/init-publish.yml
    with:
      regex: 'b*-core.[0-9]'
      prefix: 'b'
      suffix: 'core'

  pre-os-check:
    runs-on: ubuntu-latest
    outputs:
      os-list: ${{ steps.set-os.outputs.os-list }}
    steps:
      - name: Select OS matrix according to env
        id: set-os
        shell: bash
        run: |
          if [ "${{ env.ACT }}" = "true" ]; then
            echo 'os-list=["ubuntu-latest"]' >> $GITHUB_OUTPUT
          else
            echo 'os-list=["ubuntu-latest","macos-latest","windows-latest"]' >> $GITHUB_OUTPUT
          fi

  build-test:
    name: Build & Test (core)
    if: ${{ needs.detect-tag.outputs.tag_is_matched == 'true' }}
    needs: [detect-tag, pre-os-check]
    strategy: 
      matrix: 
        os: ${{ fromJson(needs.pre-os-check.outputs.os-list) }}
        rust: [stable]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Mark local run
        if: ${{ env.ACT == 'true' }}
        shell: bash
        run: echo "IS_LOCAL=true" >> $GITHUB_ENV

      - name: Checkout repository
        uses: actions/checkout@v4

      # Ensure dev manifest blocks are in place
      - name: Ensure dev features block exists
        working-directory: streaming-crypto
        shell: bash
        run: |
          grep -q "# --- FEATURES DYNAMIC START ---" Cargo.toml || { echo "Missing FEATURES DYNAMIC START block"; exit 1; }
          grep -q "# --- FEATURES DYNAMIC END ---" Cargo.toml || { echo "Missing FEATURES DYNAMIC END block"; exit 1; }

      - name: Ensure dev dependencies block exists
        working-directory: streaming-crypto
        shell: bash
        run: |
          grep -q "# --- DEPENDENCIES DYNAMIC START ---" Cargo.toml || { echo "Missing DEPENDENCIES DYNAMIC START block"; exit 1; }
          grep -q "# --- DEPENDENCIES DYNAMIC END ---" Cargo.toml || { echo "Missing DEPENDENCIES DYNAMIC END block"; exit 1; }

      - name: Cache Cargo registry and git sources
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Install Rust
        if: ${{ env.IS_LOCAL != 'true' }}
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}

      # -------------------------------------------------
      # Test actual crates (real logic)
      # -------------------------------------------------

      - name: Test core-api
        run: cargo test -p core-api

      # -------------------------------------------------
      # Test published crate (streaming-crypto)
      # -------------------------------------------------

      - name: Test streaming-crypto (core-api only)
        run: cargo test -p streaming-crypto --no-default-features --features core-api
